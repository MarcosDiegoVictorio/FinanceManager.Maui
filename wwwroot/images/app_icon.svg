<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a1c"/><stop offset="55%" stop-color="#0b1436"/><stop offset="100%" stop-color="#060a1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f8ff7" stop-opacity="0.2"/><stop offset="100%" stop-color="#4f8ff7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="481.28" fill="url(#glow)"/>
  <g transform="translate(204.8,204.8) scale(0.6)">
    <defs>
      <linearGradient id="g-tl-iconsvg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#cfeaff"/>
        <stop offset="100%" stop-color="#8fc8f8"/>
      </linearGradient>
      <linearGradient id="g-tr-iconsvg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7fb9f2"/>
        <stop offset="100%" stop-color="#4a8de0"/>
      </linearGradient>
      <linearGradient id="g-bl-iconsvg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#4a86dd"/>
        <stop offset="100%" stop-color="#2c5cc4"/>
      </linearGradient>
      <linearGradient id="g-br-iconsvg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#23459e"/>
        <stop offset="100%" stop-color="#0e1f5e"/>
      </linearGradient>
      <filter id="arrow-glow-iconsvg" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>

    <!-- facets -->
    <polygon points="72,36 100,36 100,79 26,79" fill="url(#g-tl-iconsvg)"/>
    <polygon points="100,36 128,36 174,79 100,79" fill="url(#g-tr-iconsvg)"/>
    <polygon points="26,79 100,79 100,190" fill="url(#g-bl-iconsvg)"/>
    <polygon points="100,79 174,79 100,190" fill="url(#g-br-iconsvg)"/>

    <!-- facet edges -->
    <g stroke="#eaf6ff" stroke-width="1.4" stroke-opacity="0.55" fill="none" stroke-linejoin="round">
      <polygon points="72,36 128,36 174,79 100,190 26,79"/>
      <line x1="100" y1="36" x2="100" y2="190"/>
      <line x1="26" y1="79" x2="174" y2="79"/>
    </g>

    <!-- growth arrow -->
    <g filter="url(#arrow-glow-iconsvg)">
      <path d="M44,148 L80,110 L99,127 L142,62" fill="none" stroke="#ffffff" stroke-width="13"
            stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="123,55 158,48 148,84" fill="#ffffff"/>
    </g>
  </g>
</svg>